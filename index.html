<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Password Generator</title>
<meta name="description" content="Free online password generator. Create strong, secure passwords instantly.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
h1{font-size:1.8rem;margin:20px 0 8px;background:linear-gradient(135deg,#00d2ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.subtitle{color:#888;margin-bottom:24px;font-size:.95rem;text-align:center}
.container{width:100%;max-width:600px}
.card{background:#16213e;border-radius:12px;padding:24px;margin-bottom:16px;border:1px solid #0f3460}
label{display:block;font-size:.9rem;color:#aaa;margin-bottom:8px}
.row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.row input[type=range]{flex:1;accent-color:#7b2ff7;height:6px}
.row input[type=number]{width:72px;background:#0f3460;border:1px solid #1a1a4e;color:#fff;border-radius:8px;padding:8px;text-align:center;font-size:1rem}
.row input[type=number]:focus{outline:none;border-color:#7b2ff7}
.toggles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.toggle{display:flex;align-items:center;gap:10px;background:#0f3460;padding:10px 14px;border-radius:8px;cursor:pointer;user-select:none;transition:background .2s}
.toggle:hover{background:#1a1a4e}
.toggle input{display:none}
.toggle .sw{width:40px;height:22px;background:#333;border-radius:11px;position:relative;transition:background .3s;flex-shrink:0}
.toggle .sw::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#888;border-radius:50%;transition:all .3s}
.toggle input:checked+.sw{background:#7b2ff7}
.toggle input:checked+.sw::after{left:21px;background:#fff}
.strength-bar{height:6px;border-radius:3px;background:#333;margin-top:8px;overflow:hidden}
.strength-fill{height:100%;border-radius:3px;transition:width .4s,background .4s}
.strength-text{font-size:.85rem;margin-top:6px}
.btn{background:linear-gradient(135deg,#7b2ff7,#00d2ff);color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:1rem;cursor:pointer;width:100%;font-weight:600;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.btn-sm{background:#0f3460;padding:8px 14px;border-radius:6px;font-size:.8rem;width:auto;border:1px solid #1a1a4e;font-weight:400;cursor:pointer;color:#e0e0e0}
.btn-sm:hover{background:#1a1a4e}
.btn-copy-all{margin-top:12px;background:linear-gradient(135deg,#00d2ff,#7b2ff7)}
.passwords{margin-top:12px}
.pw-item{display:flex;align-items:center;gap:8px;background:#0f3460;padding:10px 14px;border-radius:8px;margin-bottom:8px;word-break:break-all}
.pw-item code{flex:1;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:.95rem;color:#00d2ff}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#7b2ff7;color:#fff;padding:10px 24px;border-radius:8px;font-size:.9rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
footer{margin-top:auto;padding:20px 0 10px;color:#555;font-size:.8rem;text-align:center}
footer a{color:#7b2ff7;text-decoration:none}
@media(max-width:480px){h1{font-size:1.4rem}.card{padding:16px}.toggles{grid-template-columns:1fr}.row input[type=number]{width:60px}}
</style>
</head>
<body>
<div class="container">
<h1>&#128272; AI Password Generator</h1>
<p class="subtitle">Generate strong, secure passwords instantly</p>
<div class="card">
<label>Password Length: <strong id="lenVal">16</strong></label>
<div class="row"><input type="range" id="lenRange" min="8" max="128" value="16"><input type="number" id="lenNum" min="8" max="128" value="16"></div>
<label>Character Types</label>
<div class="toggles">
<label class="toggle"><input type="checkbox" id="upper" checked><span class="sw"></span>Uppercase (A-Z)</label>
<label class="toggle"><input type="checkbox" id="lower" checked><span class="sw"></span>Lowercase (a-z)</label>
<label class="toggle"><input type="checkbox" id="digits" checked><span class="sw"></span>Digits (0-9)</label>
<label class="toggle"><input type="checkbox" id="symbols" checked><span class="sw"></span>Symbols (!@#$)</label>
</div>
<label>Strength</label>
<div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
<div class="strength-text" id="strengthText">—</div>
</div>
<div class="card">
<label>Batch Count</label>
<div class="row"><input type="range" id="countRange" min="1" max="50" value="1"><input type="number" id="countNum" min="1" max="50" value="1"></div>
<button class="btn" id="genBtn">&#9889; Generate Passwords</button>
<div class="passwords" id="passwords"></div>
<button class="btn btn-copy-all" id="copyAllBtn" style="display:none">&#128203; Copy All</button>
</div>
</div>
<div class="toast" id="toast"></div>
<footer><p>AI Password Generator &copy; 2026</p></footer>
<script>
(function(){
var U='ABCDEFGHIJKLMNOPQRSTUVWXYZ',L='abcdefghijklmnopqrstuvwxyz',D='0123456789',S='!@#$%^&*()_+-=[]{}|;:,.<>?/~';
var g=document.getElementById.bind(document);
var lenR=g('lenRange'),lenN=g('lenNum'),lenV=g('lenVal');
var cntR=g('countRange'),cntN=g('countNum');
var uEl=g('upper'),lEl=g('lower'),dEl=g('digits'),sEl=g('symbols');
var sFill=g('strengthFill'),sTxt=g('strengthText');
var pwBox=g('passwords'),caBtn=g('copyAllBtn'),toast=g('toast');
var pws=[];

function sp(r,n,lb){
  r.oninput=function(){n.value=r.value;if(lb)lb.textContent=r.value;us()};
  n.oninput=function(){var v=Math.max(+r.min,Math.min(+r.max,+n.value||+r.min));r.value=v;n.value=v;if(lb)lb.textContent=v;us()};
}
sp(lenR,lenN,lenV);
sp(cntR,cntN,null);

[uEl,lEl,dEl,sEl].forEach(function(el){el.addEventListener('change',function(){
  if(!uEl.checked&&!lEl.checked&&!dEl.checked&&!sEl.checked)el.checked=true;
  us();
})});

function us(){
  var len=+lenR.value,types=0,pool=0;
  if(uEl.checked){types++;pool+=26}
  if(lEl.checked){types++;pool+=26}
  if(dEl.checked){types++;pool+=10}
  if(sEl.checked){types++;pool+=28}
  var bits=len*Math.log2(pool||1);
  var lv,cl,w;
  if(bits<40){lv=25;cl='#ff4444';w='Weak'}
  else if(bits<60){lv=50;cl='#ffaa00';w='Medium'}
  else if(bits<80){lv=75;cl='#44cc44';w='Strong'}
  else{lv=100;cl='#00d2ff';w='Very Strong'}
  sFill.style.width=lv+'%';
  sFill.style.background=cl;
  sTxt.style.color=cl;
  sTxt.textContent=w+' (~'+Math.round(bits)+' bits)';
}
us();

function gen(){
  var len=+lenR.value,cnt=+cntR.value;
  var cs='';
  if(uEl.checked)cs+=U;
  if(lEl.checked)cs+=L;
  if(dEl.checked)cs+=D;
  if(sEl.checked)cs+=S;
  if(!cs)return;
  pws=[];
  for(var i=0;i<cnt;i++){
    var arr=new Uint32Array(len);
    crypto.getRandomValues(arr);
    var pw='';
    for(var j=0;j<len;j++)pw+=cs[arr[j]%cs.length];
    pws.push(pw);
  }
  render();
}

function render(){
  pwBox.innerHTML='';
  pws.forEach(function(pw,i){
    var d=document.createElement('div');d.className='pw-item';
    var c=document.createElement('code');c.textContent=pw;
    var b=document.createElement('button');b.className='btn btn-sm';b.textContent='Copy';
    b.onclick=function(){cp(pw)};
    d.appendChild(c);d.appendChild(b);pwBox.appendChild(d);
  });
  caBtn.style.display=pws.length>1?'block':'none';
}

function cp(t){
  navigator.clipboard.writeText(t).then(function(){show('Copied!')}).catch(function(){
    var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);show('Copied!');
  });
}

function show(m){
  toast.textContent=m;toast.classList.add('show');
  setTimeout(function(){toast.classList.remove('show')},1500);
}

g('genBtn').onclick=gen;
caBtn.onclick=function(){cp(pws.join('\n'))};
gen();
})();
</script>
<script src="https://alwingulla.com/88/tag.min.js" data-zone="130647" async data-cfasync="false"></script>
</body>
</html>
